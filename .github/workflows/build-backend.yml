name: Build & Push Backend

on:
  push:
    branches:
      - main
    paths:
      - "src/backend/**"
      - "src/backend/AkaKraft.WebApi/Dockerfile"
      - ".github/workflows/build-backend.yml"

# GITHUB_TOKEN darf Packages schreiben
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Bei ghcr.io anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image-Tags und Labels ermitteln
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/akakraft-bs/akakraft-backend
          tags: |
            # :latest bei Push auf main
            type=raw,value=latest,enable={{is_default_branch}}
            # :<kurzem-SHA> für genaue Rückverfolgung
            type=sha,prefix=,format=short

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/backend/AkaKraft.WebApi/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer-Cache über GitHub Actions Cache (beschleunigt Folge-Builds)
          cache-from: type=gha
          cache-to: type=gha,mode=max
