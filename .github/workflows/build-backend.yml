name: Build Backend (manuell)
# Automatischer Build läuft jetzt über release-and-build.yml.
# Diese Datei bleibt als manueller Fallback erhalten.

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Bei ghcr.io anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image-Tags und Labels ermitteln
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/akakraft-bs/akakraft-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/backend/AkaKraft.WebApi/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
