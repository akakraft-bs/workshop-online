<div class="page-header">
  <h2>Nutzerverwaltung</h2>
</div>

@if (loading()) {
  <div class="loading-state">
    <mat-spinner diameter="48" />
  </div>
} @else {
  <div class="table-container mat-elevation-z1">
    <table mat-table [dataSource]="users()">

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let user">
          <div class="user-cell">
            @if (user.pictureUrl) {
              <img class="avatar" [src]="user.pictureUrl" [alt]="user.name">
            } @else {
              <mat-icon class="avatar-icon">account_circle</mat-icon>
            }
            {{ user.name }}
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>E-Mail</th>
        <td mat-cell *matCellDef="let user">{{ user.email }}</td>
      </ng-container>

      <ng-container matColumnDef="roles">
        <th mat-header-cell *matHeaderCellDef>Rollen</th>
        <td mat-cell *matCellDef="let user">
          <mat-chip-set>
            @for (role of user.roles; track role) {
              <mat-chip (removed)="removeRole(user, role)">
                {{ getRoleLabel(role) }}
                <button matChipRemove>
                  <mat-icon>cancel</mat-icon>
                </button>
              </mat-chip>
            }
          </mat-chip-set>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let user">
          <button mat-icon-button [matMenuTriggerFor]="roleMenu" aria-label="Rolle hinzufügen">
            <mat-icon>add_circle_outline</mat-icon>
          </button>
          <mat-menu #roleMenu>
            @for (role of getAssignableRoles(user); track role) {
              <button mat-menu-item (click)="assignRole(user, role)">
                {{ getRoleLabel(role) }}
              </button>
            }
          </mat-menu>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
}
