<div class="login-container">
  <mat-card class="login-card" appearance="outlined">
    <mat-card-header>
      <div class="logo">
        <mat-icon>handyman</mat-icon>
      </div>
      <mat-card-title>AkaKraft Online</mat-card-title>
      <mat-card-subtitle>Vereinsverwaltung</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <p>Melde dich mit deinem Google-Konto an, um auf die Vereinsverwaltung zuzugreifen.</p>
    </mat-card-content>

    <mat-card-actions class="centered-actions">
      <button mat-raised-button color="primary" (click)="login()" class="login-btn">
        <mat-icon>login</mat-icon>
        Mit Google anmelden
      </button>
    </mat-card-actions>
  </mat-card>
</div>
