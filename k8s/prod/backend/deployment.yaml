apiVersion: apps/v1
kind: Deployment
metadata:
  name: akakraft-backend
  namespace: akakraft-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: akakraft-backend
  template:
    metadata:
      labels:
        app: akakraft-backend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: backend
          image: ghcr.io/akakraft-bs/akakraft-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: akakraft-secrets
                  key: db-password
            - name: ConnectionStrings__DefaultConnection
              value: "Host=akakraft-db-rw;Port=5432;Database=akakraft;Username=akakraft;Password=$(DB_PASSWORD)"

            - name: Minio__Endpoint
              value: "akakraft-minio:9000"
            - name: Minio__AccessKey
              value: "minioadmin"
            - name: Minio__SecretKey
              valueFrom:
                secretKeyRef:
                  name: akakraft-secrets
                  key: minio-secret-key
            - name: Minio__BucketName
              value: "akakraft"
            - name: Minio__UseSSL
              value: "false"
            - name: Minio__PublicBaseUrl
              value: "https://app.akakraft-bs.de/minio"   # Produktionsdomain anpassen

            - name: Authentication__Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: akakraft-secrets
                  key: jwt-key
            - name: Authentication__Jwt__Issuer
              value: "AkaKraft"
            - name: Authentication__Jwt__Audience
              value: "AkaKraft"
            - name: Authentication__Jwt__ExpiryMinutes
              value: "480"

            - name: Authentication__Google__ClientId
              valueFrom:
                secretKeyRef:
                  name: akakraft-secrets
                  key: google-client-id
            - name: Authentication__Google__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: akakraft-secrets
                  key: google-client-secret

            - name: GoogleCalendar__ServiceAccountJson
              valueFrom:
                secretKeyRef:
                  name: google-calendar-secret
                  key: service-account-json

            - name: Email__SmtpHost
              valueFrom:
                secretKeyRef:
                  name: akakraft-secrets
                  key: email-smtp-host
            - name: Email__SmtpPort
              valueFrom:
                secretKeyRef:
                  name: akakraft-secrets
                  key: email-smtp-port
            - name: Email__SmtpRequiresAuth
              valueFrom:
                secretKeyRef:
                  name: akakraft-secrets
                  key: email-smtp-requires-auth
            - name: Email__SmtpUsername
              valueFrom:
                secretKeyRef:
                  name: akakraft-secrets
                  key: email-smtp-username
            - name: Email__SmtpPassword
              valueFrom:
                secretKeyRef:
                  name: akakraft-secrets
                  key: email-smtp-password
            - name: Email__FromAddress
              valueFrom:
                secretKeyRef:
                  name: akakraft-secrets
                  key: email-from-address
            - name: Email__FromName
              valueFrom:
                secretKeyRef:
                  name: akakraft-secrets
                  key: email-from-name

            - name: Admin__Email
              valueFrom:
                secretKeyRef:
                  name: akakraft-secrets
                  key: admin-email

            - name: Firebase__AdminSdkJson
              valueFrom:
                secretKeyRef:
                  name: akakraft-secrets
                  key: firebase-admin-json

            - name: Frontend__BaseUrl
              value: "https://app.akakraft-bs.de/app"     # Produktionsdomain anpassen

            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_FORWARDEDHEADERS_ENABLED
              value: "true"

          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
