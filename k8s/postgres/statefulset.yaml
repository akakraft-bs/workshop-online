apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: akakraft-postgres
  namespace: akakraft
spec:
  serviceName: akakraft-postgres
  replicas: 1
  selector:
    matchLabels:
      app: akakraft-postgres
  template:
    metadata:
      labels:
        app: akakraft-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: akakraft
            - name: POSTGRES_USER
              value: akakraft
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: akakraft-secrets
                  key: db-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "akakraft"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path   # k3s built-in provisioner
        resources:
          requests:
            storage: 5Gi
